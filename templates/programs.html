{% extends "base.html" %}

{% set title = "专业速查 - ToCU" %}

{% block body %}
<section class="tocu-page-stack">
  <div class="tocu-directory-toolbar">
    <label class="tocu-field tocu-field--search">
      <span class="sr-only">搜索专业</span>
      <input id="program-search" type="text" placeholder="输入专业名、学院或方向关键词..." class="tocu-input">
    </label>
  </div>

  <div id="program-list" class="tocu-directory-grid">
    {% for p in programs %}
      <article class="program-item tocu-directory-card" data-name="{{ p.name }}" data-school="{{ p.school }}" data-focus="{{ p.focus }}">
        <div class="tocu-directory-card__top">
          <div>
            <h2 class="tocu-directory-card__title">{{ p.name }}</h2>
            <p class="tocu-directory-card__school">{{ p.school }}</p>
          </div>
          <span class="tocu-directory-card__badge">{{ p.degree }}</span>
        </div>

        <dl class="tocu-directory-card__facts">
          <div>
            <dt>方向</dt>
            <dd>{{ p.focus }}</dd>
          </div>
          <div>
            <dt>语言</dt>
            <dd>{{ p.language }}</dd>
          </div>
          <div>
            <dt>截止日期</dt>
            <dd>{{ p.deadline }}</dd>
          </div>
        </dl>

        <a href="{{ p.link }}" target="_blank" rel="noreferrer" class="tocu-directory-card__link">查看官网入口</a>
      </article>
    {% endfor %}
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/programs.js') }}"></script>
{% endblock %}
