{% extends "base.html" %}

{% set title = "常见问题 - 港中文申请一站式助手" %}

{% block body %}
<section>
  <div class="cuhk-card px-6 md:px-8 py-8">
    <span class="cuhk-kicker">FAQs</span>
    <h1 class="mt-4 text-4xl md:text-5xl cuhk-display text-ink-900">常见问题</h1>
    <p class="mt-3 text-base md:text-lg cuhk-muted">先看高频问题，再进入详情页评论交流。</p>

    <div class="mt-6">
      <input id="faq-search" type="text" placeholder="输入关键词筛选问题..." class="w-full md:w-[30rem] rounded-xl border border-brand-100 bg-paper-25 px-4 py-3 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
    </div>
  </div>

  <div id="faq-list" class="mt-6 space-y-4">
    {% for item in faqs %}
      <article class="faq-item cuhk-card-soft cuhk-lift p-5" data-question="{{ item.question }}" data-answer="{{ item.answer }}" data-category="{{ item.category }}">
        <div class="inline-flex rounded-full bg-brand-50 px-3 py-1 text-xs font-semibold text-brand-700">{{ item.category }}</div>
        <h2 class="mt-3 text-xl cuhk-guide-title text-ink-900">{{ item.question }}</h2>
        <p class="mt-2 text-sm text-ink-700 leading-7">{{ item.answer }}</p>
        <a href="{{ url_for('faq_detail', faq_id=item.id) }}" class="inline-flex mt-4 cuhk-btn-secondary px-4 py-2 text-sm">查看详情与评论 →</a>
      </article>
    {% endfor %}
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/faq.js') }}"></script>
{% endblock %}
