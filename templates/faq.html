{% extends "base.html" %}

{% set title = "常见问题 - ToCU" %}

{% block body %}
<section class="tocu-page-stack">
  <header class="tocu-page-hero">
    <p class="tocu-page-hero__eyebrow">FAQ</p>
    <h1 class="tocu-page-hero__title">常见问题</h1>
    <p class="tocu-page-hero__summary">当你想先看高频问题而不是直接提问时，可以从这里开始。</p>
  </header>

  <div class="tocu-directory-toolbar">
    <label class="tocu-field tocu-field--search">
      <span class="sr-only">搜索问题</span>
      <input id="faq-search" type="text" placeholder="输入关键词筛选问题..." class="tocu-input">
    </label>
  </div>

  <div id="faq-list" class="tocu-faq-list">
    {% for item in faqs %}
      <article class="faq-item tocu-faq-card" data-question="{{ item.question }}" data-answer="{{ item.answer }}" data-category="{{ item.category }}">
        <span class="tocu-faq-card__badge">{{ item.category }}</span>
        <h2 class="tocu-faq-card__title">{{ item.question }}</h2>
        <p class="tocu-faq-card__body">{{ item.answer }}</p>
        <a href="{{ url_for('faq_detail', faq_id=item.id) }}" class="tocu-btn tocu-btn--secondary tocu-btn--small">查看详情与评论</a>
      </article>
    {% endfor %}
  </div>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/faq.js') }}"></script>
{% endblock %}
