{% extends "base.html" %}

{% set title = "登录 - ToCU" %}
{% set next_url = request.args.get("next", url_for("index")) %}

{% block body %}
<section class="tocu-page-stack">
  <header class="tocu-page-hero">
    <p class="tocu-page-hero__eyebrow">Account</p>
    <h1 class="tocu-page-hero__title">登录 / 注册</h1>
    <p class="tocu-page-hero__summary">登录后可发表评论，并保留你的阶段进度与个人资料。</p>
  </header>

  <div class="tocu-auth-grid">
    <article class="tocu-auth-card">
      <h2 class="tocu-auth-card__title">已有账号</h2>
      <form action="{{ url_for('auth_login') }}" method="post" class="tocu-form-stack">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label class="tocu-field">
          <span class="tocu-field__label">邮箱</span>
          <input name="email" type="email" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">密码</span>
          <input name="password" type="password" required class="tocu-input">
        </label>
        <button type="submit" class="tocu-btn tocu-btn--primary tocu-btn--full">登录</button>
      </form>
    </article>

    <article class="tocu-auth-card">
      <h2 class="tocu-auth-card__title">注册新账号</h2>
      <form action="{{ url_for('auth_register') }}" method="post" class="tocu-form-stack">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label class="tocu-field">
          <span class="tocu-field__label">昵称</span>
          <input name="name" type="text" maxlength="20" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">邮箱</span>
          <input name="email" type="email" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">密码（至少 6 位）</span>
          <input name="password" type="password" minlength="6" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">头像色</span>
          <select name="avatar_seed" class="tocu-input">
            {% for seed in ['sky', 'emerald', 'amber', 'rose', 'violet'] %}
              <option value="{{ seed }}">{{ seed }}</option>
            {% endfor %}
          </select>
        </label>
        <button type="submit" class="tocu-btn tocu-btn--secondary tocu-btn--full">注册并登录</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}
