{% extends "base.html" %}

{% set title = "登录 - 港中文申请一站式助手" %}

{% block body %}
<section>
  <h1 class="text-2xl font-bold text-slate-900">登录</h1>
  <p class="text-slate-600 mt-2">登录后可发表评论，并将评论与用户账号绑定。</p>

  <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-5">
    <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900">已有账号</h2>
      <form action="{{ url_for('auth_login') }}" method="post" class="mt-4 space-y-3">
        <div>
          <label class="text-sm text-slate-600">邮箱</label>
          <input name="email" type="email" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="text-sm text-slate-600">密码</label>
          <input name="password" type="password" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <button type="submit" class="w-full rounded-lg bg-brand-600 text-white py-2 text-sm">登录</button>
      </form>
    </article>

    <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900">注册新账号</h2>
      <form action="{{ url_for('auth_register') }}" method="post" class="mt-4 space-y-3">
        <div>
          <label class="text-sm text-slate-600">昵称</label>
          <input name="name" type="text" maxlength="20" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="text-sm text-slate-600">邮箱</label>
          <input name="email" type="email" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="text-sm text-slate-600">密码（至少 6 位）</label>
          <input name="password" type="password" minlength="6" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
        </div>
        <div>
          <label class="text-sm text-slate-600">头像色</label>
          <select name="avatar_seed" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
            {% for seed in ['sky', 'emerald', 'amber', 'rose', 'violet'] %}
              <option value="{{ seed }}">{{ seed }}</option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="w-full rounded-lg border border-brand-200 text-brand-700 py-2 text-sm hover:bg-brand-50">注册并登录</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}
