{% extends "base.html" %}

{% set title = "登录 - 港中文申请一站式助手" %}

{% block body %}
<section>
  <div class="cuhk-card px-6 md:px-8 py-8">
    <span class="cuhk-kicker">Account</span>
    <h1 class="mt-4 text-4xl md:text-5xl cuhk-display text-ink-900">登录 / 注册</h1>
    <p class="mt-3 text-base md:text-lg cuhk-muted">登录后可发表评论，并将评论与用户账号绑定。</p>
  </div>

  <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-5">
    <article class="cuhk-card-soft p-5 md:p-6">
      <h2 class="text-2xl cuhk-guide-title text-ink-900">已有账号</h2>
      <form action="{{ url_for('auth_login') }}" method="post" class="mt-4 space-y-3">
        <div>
          <label class="text-sm text-ink-700">邮箱</label>
          <input name="email" type="email" required class="mt-1 w-full rounded-xl border border-brand-100 bg-paper-25 px-3 py-2.5 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
        </div>
        <div>
          <label class="text-sm text-ink-700">密码</label>
          <input name="password" type="password" required class="mt-1 w-full rounded-xl border border-brand-100 bg-paper-25 px-3 py-2.5 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
        </div>
        <button type="submit" class="w-full cuhk-btn-primary py-2.5 text-sm">登录</button>
      </form>
    </article>

    <article class="cuhk-card-soft p-5 md:p-6">
      <h2 class="text-2xl cuhk-guide-title text-ink-900">注册新账号</h2>
      <form action="{{ url_for('auth_register') }}" method="post" class="mt-4 space-y-3">
        <div>
          <label class="text-sm text-ink-700">昵称</label>
          <input name="name" type="text" maxlength="20" required class="mt-1 w-full rounded-xl border border-brand-100 bg-paper-25 px-3 py-2.5 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
        </div>
        <div>
          <label class="text-sm text-ink-700">邮箱</label>
          <input name="email" type="email" required class="mt-1 w-full rounded-xl border border-brand-100 bg-paper-25 px-3 py-2.5 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
        </div>
        <div>
          <label class="text-sm text-ink-700">密码（至少 6 位）</label>
          <input name="password" type="password" minlength="6" required class="mt-1 w-full rounded-xl border border-brand-100 bg-paper-25 px-3 py-2.5 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
        </div>
        <div>
          <label class="text-sm text-ink-700">头像色</label>
          <select name="avatar_seed" class="mt-1 w-full rounded-xl border border-brand-100 bg-paper-25 px-3 py-2.5 text-sm text-ink-900 focus:outline-none focus:ring-2 focus:ring-brand-200">
            {% for seed in ['sky', 'emerald', 'amber', 'rose', 'violet'] %}
              <option value="{{ seed }}">{{ seed }}</option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="w-full cuhk-btn-secondary py-2.5 text-sm">注册并登录</button>
      </form>
    </article>
  </div>
</section>
{% endblock %}
