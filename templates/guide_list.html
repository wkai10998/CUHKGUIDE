{% extends "base.html" %}

{% set title = "操作步骤 - 港中文申请一站式助手" %}

{% block body %}
<section>
  <h1 class="text-2xl font-bold text-slate-900">操作步骤</h1>
  <p class="text-slate-600 mt-2">按阶段进入详细步骤页，每个步骤都包含教程、材料清单和评论区。</p>

  <div class="mt-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    {% for stage in stages %}
      <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <p class="text-xs text-slate-400">{{ stage.month }}</p>
        <h2 class="mt-2 text-lg font-semibold text-slate-900">{{ stage.title }}</h2>
        <p class="mt-2 text-sm text-slate-600 leading-6">{{ stage.description }}</p>
        <a href="{{ url_for('guide', stage_slug=stage.slug) }}" class="inline-block mt-4 rounded-lg border border-brand-200 text-brand-700 px-3 py-1.5 text-sm hover:bg-brand-50">进入阶段</a>
      </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
