{% extends "base.html" %}

{% block title %}交流区 - 中大硕士申请助手{% endblock %}

{% block content %}
  <h1 class="text-2xl font-bold mb-6">问答支持</h1>

  <div class="mb-4">
    <input
      id="qa-search"
      type="text"
      placeholder="输入关键词筛选问题..."
      class="w-full md:w-96 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
    >
  </div>

  <div id="qa-list" class="space-y-4">
    {% for q in questions %}
      <a
        href="{{ url_for('qa_detail', q_id=q.id) }}"
        class="qa-item block p-4 border border-slate-200 bg-white rounded-lg hover:bg-slate-50 transition"
        data-title="{{ q.title }}"
        data-category="{{ q.category }}"
      >
        <div class="text-sm text-slate-400">{{ q.category }}</div>
        <div class="font-medium">{{ q.title }}</div>
      </a>
    {% endfor %}
  </div>
{% endblock %}

{% block extra_scripts %}
  <script src="{{ url_for('static', filename='js/qa.js') }}"></script>
{% endblock %}
