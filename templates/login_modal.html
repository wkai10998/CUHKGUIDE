{% set next_url = request.full_path if request.query_string else request.path %}
{% set default_auth_tab = request.args.get("auth_tab", "login") %}
{% if default_auth_tab not in ["login", "register"] %}
  {% set default_auth_tab = "login" %}
{% endif %}

<div
  id="login-modal"
  data-auto-open="{{ '1' if request.args.get('open_login') == '1' else '0' }}"
  data-auto-tab="{{ default_auth_tab }}"
  class="hidden fixed inset-0 z-50 items-center justify-center bg-black/35 px-4"
>
  <div class="tocu-auth-modal">
    <div class="tocu-auth-modal__head">
      <div>
        <h2 class="tocu-auth-modal__title">登录 / 注册</h2>
        <p class="tocu-auth-modal__body">登录后可以发表评论，并同步你的学习进度。</p>
      </div>
      <button type="button" data-close-login class="tocu-btn tocu-btn--ghost tocu-btn--small">关闭</button>
    </div>

    <div class="tocu-auth-modal__tabs">
      <button type="button" data-auth-tab="login" class="auth-tab tocu-auth-modal__tab">登录</button>
      <button type="button" data-auth-tab="register" class="auth-tab tocu-auth-modal__tab">注册</button>
    </div>

    <section data-auth-panel="login" class="mt-4">
      <form action="{{ url_for('auth_login') }}" method="post" class="tocu-form-stack">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label class="tocu-field">
          <span class="tocu-field__label">邮箱</span>
          <input name="email" type="email" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">密码</span>
          <input name="password" type="password" required class="tocu-input">
        </label>
        <button type="submit" class="tocu-btn tocu-btn--primary tocu-btn--full">登录</button>
      </form>
    </section>

    <section data-auth-panel="register" class="mt-4 hidden">
      <form action="{{ url_for('auth_register') }}" method="post" class="tocu-form-stack">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label class="tocu-field">
          <span class="tocu-field__label">昵称</span>
          <input name="name" type="text" maxlength="20" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">邮箱</span>
          <input name="email" type="email" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">密码（至少 6 位）</span>
          <input name="password" type="password" minlength="6" required class="tocu-input">
        </label>
        <label class="tocu-field">
          <span class="tocu-field__label">头像色</span>
          <select name="avatar_seed" class="tocu-input">
            {% for seed in ['sky', 'emerald', 'amber', 'rose', 'violet'] %}
              <option value="{{ seed }}">{{ seed }}</option>
            {% endfor %}
          </select>
        </label>
        <button type="submit" class="tocu-btn tocu-btn--secondary tocu-btn--full">注册并登录</button>
      </form>
    </section>
  </div>
</div>
