<section class="relative overflow-hidden cuhk-card px-6 md:px-8 py-10 md:py-12">
  <div class="absolute inset-y-0 right-0 w-2/5 bg-gradient-to-bl from-brand-100/80 to-transparent pointer-events-none hidden lg:block"></div>
  <div class="relative grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
    <div>
      <span class="cuhk-kicker">2024 - 2026 官方指南</span>
      <h1 class="mt-5 text-4xl md:text-6xl cuhk-display text-ink-900 leading-tight">
        CUHK
        <span class="text-brand-600 block">申请指南</span>
      </h1>
      <p class="mt-4 text-base md:text-lg cuhk-muted leading-8 max-w-xl">
        为中国内地学子打造的一站式路线图，聚合时间线、步骤清单、材料要求与经验提示，帮助你稳步推进申请流程。
      </p>

      <div class="mt-8 flex flex-wrap items-center gap-3">
        <a href="{{ url_for('guide_list') }}" class="cuhk-btn-primary px-5 py-3 text-sm">查看申请步骤</a>
        <a href="{{ url_for('programs') }}" class="cuhk-btn-secondary px-5 py-3 text-sm">查看申请要求</a>
      </div>

      {% if last_stage %}
        <div class="mt-6 inline-flex items-center gap-2 rounded-full border border-brand-200 bg-brand-50 px-4 py-2 text-sm text-brand-700">
          <span class="font-semibold">上次浏览：</span>
          <a class="underline decoration-brand-300 hover:decoration-brand-600" href="{{ url_for('guide', stage_slug=last_stage) }}">{{ last_stage }}</a>
        </div>
      {% endif %}
    </div>

    <div class="relative">
      <div class="rounded-3xl border border-brand-100/70 bg-gradient-to-br from-[#18323f] via-[#27465c] to-[#355d70] p-4 shadow-float-card">
        <img src="{{ url_for('static', filename='images/guides/register.svg') }}" alt="申请准备视觉示意图" class="w-full rounded-2xl bg-paper-100/30 p-7 md:p-10">
      </div>

      <article class="cuhk-card-soft p-4 md:p-5 max-w-xs absolute -bottom-5 md:-bottom-7 -left-2 md:-left-8">
        <p class="inline-flex items-center rounded-full bg-accent-100 px-2.5 py-1 text-xs font-semibold text-accent-600">全球前 50 名</p>
        <p class="mt-3 text-sm text-ink-900 font-semibold">把关键节点走稳，录取概率更高。</p>
        <p class="mt-1 text-xs text-ink-700 leading-6">按月推进任务、按步骤打卡，可显著降低临截止前的操作风险。</p>
      </article>
    </div>
  </div>
</section>
